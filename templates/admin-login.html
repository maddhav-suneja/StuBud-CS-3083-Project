<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StuBud Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide purple-surface" style="max-width: 580px; padding: 48px 42px;">
      <h1 class="brand" style="font-size: 3.5rem;">StuBud</h1>
      <p class="subtitle" style="font-size: 2rem; font-weight: 700;">Admin Login</p>

      <form id="adminLoginForm" style="max-width: 320px; width: 100%; margin: 10px auto 0;">
        <div class="form-group">
          <label for="admin-email">Admin Email</label>
          <input id="admin-email" type="email" placeholder="admin@stubud.com" required />
        </div>

        <div class="form-group">
          <label for="admin-password">Password</label>
          <input id="admin-password" type="password" placeholder="Enter password" required />
        </div>

        <button class="btn btn-secondary btn-block" type="submit">Login</button>
      </form>
    </section>
  </main>
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;
      
      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nyu_email: email, password: password })
        });
        const data = await response.json();
        if (response.ok && data.student.account_role === 'admin') {
          localStorage.setItem('token', data.token);
          window.location.href = '/admin-dashboard';
        } else {
          alert(data.error || 'Login failed or not admin');
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    });
  </script>
</body>
</html>
