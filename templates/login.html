<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StuBud Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="page page-light">
    <section class="card compact" style="max-width: 460px; padding: 48px 42px;">
      <h1 class="brand" style="font-size: 4rem;">StuBud</h1>

      <form id="loginForm" style="max-width: 320px; margin: 22px auto 0;">
        <div class="form-group">
          <label for="nyu-email">NYU Email</label>
          <input id="nyu-email" type="email" placeholder="netid@nyu.edu" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" required />
        </div>

        <button class="btn btn-primary btn-block" type="submit">Login</button>
        <a class="btn btn-primary btn-block" href="/signup" style="margin-top: 10px;">Sign Up</a>
      </form>

      <div class="link-row">
        <a href="/signup">Don't have an account?</a>
        <a href="/admin-login" style="margin-left: 16px;">Admin login</a>
      </div>
    </section>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('nyu-email').value;
      const password = document.getElementById('password').value;
      
      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nyu_email: email, password: password })
        });
        const data = await response.json();
        if (response.ok) {
          localStorage.setItem('token', data.token);
          window.location.href = '/dashboard';
        } else {
          alert(data.error || 'Login failed');
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    });
  </script>
</body>
</html>
