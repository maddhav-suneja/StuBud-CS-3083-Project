<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Info</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide">
      <div class="dashboard-grid">
        <aside class="icon-rail">
          <a class="home-icon" href="/students">⌂</a>
        </aside>

        <section>
          <h1 class="page-title" id="studentTitle">Student Info</h1>
          <div class="info-lines" id="studentInfo" style="margin-top: 36px; max-width: 620px;">
            <p>Loading student information...</p>
          </div>

          <div class="actions">
            <a class="btn btn-primary" href="/students">Back to Students</a>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script>
    async function loadStudentInfo() {
      const email = new URLSearchParams(window.location.search).get('nyu_email');
      if (!email) {
        document.getElementById('studentInfo').innerHTML = '<p>No student selected</p>';
        return;
      }

      try {
        const response = await fetch(`/api/student?nyu_email=${encodeURIComponent(email)}`);
        if (response.ok) {
          const profile = await response.json();
          const student = profile.student;
          document.getElementById('studentTitle').textContent = `${student.first_name} ${student.last_name}`;
          const fields = [
            ['Name', `${student.first_name} ${student.last_name}`],
            ['Email', student.nyu_email],
            ['Role', student.account_role],
          ];

          // Add courses
          if (profile.courses && profile.courses.length > 0) {
            const courseNames = profile.courses.map(c => c.course_name).join(', ');
            fields.push(['Courses Taken', courseNames]);
          } else {
            fields.push(['Courses Taken', 'None']);
          }

          // Add available times
          if (profile.available_times && profile.available_times.length > 0) {
            const timeStrings = profile.available_times.map(t => {
              const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
              const day = days[t.week_day - 1] || `Day ${t.week_day}`;
              return `${day} ${t.start_time} - ${t.end_time}`;
            }).join(', ');
            fields.push(['Available Times', timeStrings]);
          } else {
            fields.push(['Available Times', 'None']);
          }

          document.getElementById('studentInfo').innerHTML = fields.map(([label, value]) => `
            <p>${label}: ${value || 'N/A'}</p>
          `).join('');
        } else {
          document.getElementById('studentInfo').innerHTML = '<p>Student information not found</p>';
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('studentInfo').innerHTML = '<p>Error loading student information</p>';
      }
    }

    loadStudentInfo();
  </script>
</body>
</html>
