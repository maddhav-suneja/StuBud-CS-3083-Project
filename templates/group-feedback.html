<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Feedback</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide">
      <div class="dashboard-grid">
        <aside class="icon-rail">
          <a class="home-icon" id="groupDetailsBack" href="/group-details">⌂</a>
        </aside>

        <section>
          <h1 class="page-title">Group Feedback</h1>
          <div class="feedback-list" id="feedbackContainer" style="margin-top: 26px;">
            <p>Loading feedback...</p>
          </div>

          <form id="feedbackForm" style="margin-top: 32px;">
            <h3>Leave Feedback</h3>
            <div class="form-group">
              <label for="rating">Rating (1-10)</label>
              <input id="rating" type="number" min="1" max="10" required />
            </div>
            <div class="form-group">
              <label for="comment">Comment (optional)</label>
              <textarea id="comment" rows="3"></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Submit Feedback</button>
          </form>

          <div class="actions center-actions">
            <a class="btn btn-primary" href="/groups">Back to Groups</a>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script>
    async function loadFeedback() {
      const meetingId = new URLSearchParams(window.location.search).get('meeting_id');
      try {
        const response = await fetch(`/api/group-feedback?meeting_id=${meetingId}`);
        const feedbacks = await response.json();
        
        const container = document.getElementById('feedbackContainer');
        if (feedbacks && feedbacks.length > 0) {
          container.innerHTML = feedbacks.map(f => `
            <article class="feedback-card">
              <div class="avatar-placeholder">◌</div>
              <div>
                <h4>${f.nyu_email}</h4>
                <p class="meta">Rating: ${f.rating}/10</p>
                <p class="meta">${f.comment || 'No comment'}</p>
              </div>
            </article>
          `).join('');
        } else {
          container.innerHTML = '<p>No feedback yet</p>';
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function setBackLink() {
      const meetingId = new URLSearchParams(window.location.search).get('meeting_id');
      const backLink = document.getElementById('groupDetailsBack');
      if (meetingId && backLink) {
        backLink.href = `/group-details?meeting_id=${meetingId}`;
      }
    }

    document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const meetingId = new URLSearchParams(window.location.search).get('meeting_id');
      const token = localStorage.getItem('token');
      const rating = document.getElementById('rating').value;
      const comment = document.getElementById('comment').value;

      if (!meetingId || !rating) {
        alert('Meeting ID and rating are required');
        return;
      }

      try {
        const response = await fetch('/api/group-feedback', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            meeting_id: meetingId,
            rating: parseInt(rating),
            comment: comment
          })
        });
        const data = await response.json();
        if (response.ok) {
          alert('Feedback submitted successfully!');
          loadFeedback(); // Reload feedback
          document.getElementById('feedbackForm').reset();
        } else {
          alert(data.error || 'Failed to submit feedback');
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    });

    loadFeedback();
    setBackLink();
  </script>
</body>
</html>
