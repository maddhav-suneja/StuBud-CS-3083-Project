<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Student Info</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide purple-surface">
      <div class="dashboard-grid">
        <aside>
          <a class="admin-badge" href="/admin-dashboard">Admin Dashboard</a>
        </aside>

        <section>
          <h1 class="page-title">Student Info</h1>
          <div class="info-lines" id="studentInfo" style="margin-top: 42px; max-width: 620px;">
            <p>Loading...</p>
          </div>

          <div class="actions center-actions" style="margin-top: 54px;">
            <button class="btn btn-secondary" style="color: red;" onclick="deleteStudent()">Delete Student Account</button>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');

    async function loadStudent() {
      if (!email) return;
      const token = localStorage.getItem('token');
      try {
        const response = await fetch('/api/admin/student?email=' + encodeURIComponent(email), {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const student = await response.json();
        if (response.ok) {
          document.getElementById('studentInfo').innerHTML = `
            <p>Name: ${student.first_name} ${student.last_name}</p>
            <p>Role: ${student.account_role}</p>
            <p>NYU Email: ${student.nyu_email}</p>
          `;
        } else {
          document.getElementById('studentInfo').innerHTML = '<p>Student not found</p>';
        }
      } catch (error) {
        document.getElementById('studentInfo').innerHTML = '<p>Error loading student</p>';
      }
    }

    async function deleteStudent() {
      if (!confirm('Are you sure you want to delete this student account?')) return;
      const token = localStorage.getItem('token');
      try {
        const response = await fetch('/api/admin/delete-student', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ nyu_email: email })
        });
        if (response.ok) {
          alert('Student deleted successfully');
          window.location.href = '/admin-students';
        } else {
          alert('Failed to delete student');
        }
      } catch (error) {
        alert('Error deleting student');
      }
    }

    loadStudent();
  </script>
</body>
</html>
