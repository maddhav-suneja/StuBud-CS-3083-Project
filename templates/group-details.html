<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Details</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="page page-light">
    <section class="card-wide">
      <div class="dashboard-grid">
        <aside class="icon-rail">
          <a class="home-icon" href="/dashboard">⌂</a>
        </aside>

        <section>
          <h1 class="page-title" id="groupTitle">Group Details</h1>
          <div class="split" style="margin-top: 24px;">
            <article class="small-info" id="groupInfo">
              <p>Loading group information...</p>
            </article>

            <article>
              <div class="rating" id="groupRating">Average rating: --</div>
            </article>
          </div>

          <div id="studentsContainer" class="student-list">
            <p>Students list coming soon</p>
          </div>

          <div id="groupActions" class="actions center-actions">
            <a class="btn btn-primary" id="studyMaterialsLink" href="/study-materials">Attach Files</a>
            <a class="btn btn-primary" id="feedbackLink" href="/group-feedback">See Feedback</a>
            <a class="btn btn-primary" href="/groups">Back to Groups</a>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script>
    async function loadGroupDetails() {
      const meetingId = new URLSearchParams(window.location.search).get('meeting_id');
      if (!meetingId) {
        document.getElementById('groupInfo').innerHTML = '<p>No group selected</p>';
        return;
      }

      try {
        const response = await fetch('/api/groups');
        const groups = await response.json();
        const group = groups.find(g => g.meeting_id == meetingId);
        
        if (group) {
          const now = new Date();
          const expiresAt = new Date(group.end_time);
          const isActive = expiresAt > now;

          document.getElementById('groupTitle').textContent = `Meeting ${group.meeting_id}`;
          document.getElementById('groupInfo').innerHTML = `
            <p>Start Time: ${new Date(group.start_time).toLocaleString()}</p>
            <p>End Time: ${expiresAt.toLocaleString()}</p>
            <p>Course: ${group.course_name || 'N/A'}</p>
            <p>Location: ${group.building} Room ${group.room}</p>
            <p>Notes: ${group.meeting_note || 'N/A'}</p>
          `;
          document.getElementById('studyMaterialsLink').href = `/study-materials?meeting_id=${meetingId}`;
          const feedbackLink = document.getElementById('feedbackLink');
          feedbackLink.href = `/group-feedback?meeting_id=${meetingId}`;
          await loadAverageRating(meetingId);
          await loadStudentList(meetingId);

          const groupActions = document.getElementById('groupActions');
          if (isActive) {
            const joinButton = document.createElement('a');
            joinButton.className = 'btn btn-primary';
            joinButton.href = `/join-group?meeting_id=${meetingId}`;
            joinButton.textContent = 'Join Group';
            groupActions.insertBefore(joinButton, feedbackLink);
          } else {
            const expiredNotice = document.createElement('p');
            expiredNotice.className = 'meta';
            expiredNotice.style.marginBottom = '16px';
            expiredNotice.textContent = 'This group has expired. You can still leave feedback.';
            groupActions.parentNode.insertBefore(expiredNotice, groupActions);
          }
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function loadStudentList(meetingId) {
      try {
        const response = await fetch(`/api/group-students?meeting_id=${meetingId}`);
        const students = await response.json();
        const container = document.getElementById('studentsContainer');

        if (students && students.length > 0) {
          container.innerHTML = `<h2>Students</h2><ul>${students
            .map((student) => `<li>${student.name}</li>`)
            .join('')}</ul>`;
        } else {
          container.innerHTML = '<p>Students list coming soon</p>';
        }
      } catch (error) {
        console.error('Error loading students:', error);
        document.getElementById('studentsContainer').innerHTML = '<p>Students list coming soon</p>';
      }
    }

    async function loadAverageRating(meetingId) {
      try {
        const response = await fetch(`/api/group-feedback?meeting_id=${meetingId}`);
        const feedbacks = await response.json();
        const ratingEl = document.getElementById('groupRating');
        if (feedbacks && feedbacks.length > 0) {
          const avg = feedbacks.reduce((sum, f) => sum + Number(f.rating || 0), 0) / feedbacks.length;
          ratingEl.textContent = `Average rating: ${avg.toFixed(1)} / 10`;
        } else {
          ratingEl.textContent = 'Average rating: Not rated yet';
        }
      } catch (error) {
        console.error('Error loading ratings:', error);
      }
    }

    loadGroupDetails();
  </script>
</body>
</html>
